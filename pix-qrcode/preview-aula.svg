<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#00B383"/>
      <stop offset="50%" stop-color="#007A5A"/>
      <stop offset="100%" stop-color="#1A3A5C"/>
    </linearGradient>
    <!-- círculos decorativos -->
    <radialGradient id="c1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- fundo -->
  <rect width="800" height="260" rx="12" fill="url(#bg)"/>

  <!-- círculos decorativos de fundo -->
  <circle cx="680" cy="40"  r="120" fill="rgba(255,255,255,0.05)"/>
  <circle cx="720" cy="220" r="90"  fill="rgba(255,255,255,0.04)"/>
  <circle cx="30"  cy="230" r="80"  fill="rgba(255,255,255,0.03)"/>

  <!-- badge -->
  <rect x="48" y="44" width="230" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
  <text x="163" y="63" font-family="system-ui, sans-serif" font-size="12" font-weight="600"
        fill="white" text-anchor="middle" letter-spacing="1">AULA MAGNA · MATERIAL DIDÁTICO</text>

  <!-- título -->
  <text x="48" y="116" font-family="system-ui, sans-serif" font-size="38" font-weight="800"
        fill="white">Pix por QR Code</text>

  <!-- subtítulo linha 1 -->
  <text x="48" y="150" font-family="system-ui, sans-serif" font-size="15" fill="rgba(255,255,255,0.8)">
    Do BR Code ao payload JSON — tudo que você precisa saber sobre como o
  </text>
  <!-- subtítulo linha 2 -->
  <text x="48" y="170" font-family="system-ui, sans-serif" font-size="15" fill="rgba(255,255,255,0.8)">
    Pix funciona quando um QR Code é lido
  </text>

  <!-- separador -->
  <line x1="48" y1="196" x2="752" y2="196" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- pills de meta -->
  <rect x="48"  y="210" width="130" height="26" rx="13" fill="rgba(255,255,255,0.12)"/>
  <text x="113" y="227" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)"
        text-anchor="middle">30–60 min de estudo</text>

  <rect x="190" y="210" width="222" height="26" rx="13" fill="rgba(255,255,255,0.12)"/>
  <text x="301" y="227" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)"
        text-anchor="middle">Manuais BCB vigentes (2026)</text>

  <rect x="424" y="210" width="320" height="26" rx="13" fill="rgba(255,255,255,0.12)"/>
  <text x="584" y="227" font-family="system-ui, sans-serif" font-size="12" fill="rgba(255,255,255,0.9)"
        text-anchor="middle">Res. BCB 1/2020 + Manuais UX v7.3 e Padrões v2.9.0</text>
</svg>
