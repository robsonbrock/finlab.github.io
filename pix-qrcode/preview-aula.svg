<svg xmlns="http://www.w3.org/2000/svg" width="800" height="210" viewBox="0 0 800 210">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#00B383"/>
      <stop offset="50%" stop-color="#007A5A"/>
      <stop offset="100%" stop-color="#1A3A5C"/>
    </linearGradient>
  </defs>

  <rect width="800" height="210" rx="10" fill="url(#bg)"/>
  <circle cx="680" cy="30"  r="110" fill="rgba(255,255,255,0.05)"/>
  <circle cx="720" cy="190" r="80"  fill="rgba(255,255,255,0.04)"/>

  <!-- badge -->
  <rect x="40" y="34" width="230" height="24" rx="12" fill="rgba(255,255,255,0.15)"/>
  <text x="155" y="51" font-family="system-ui,sans-serif" font-size="11" font-weight="600"
        fill="white" text-anchor="middle" letter-spacing="1">AULA MAGNA · MATERIAL DIDÁTICO</text>

  <!-- título -->
  <text x="40" y="96" font-family="system-ui,sans-serif" font-size="34" font-weight="800" fill="white">Pix por QR Code</text>

  <!-- subtítulo -->
  <text x="40" y="122" font-family="system-ui,sans-serif" font-size="13.5" fill="rgba(255,255,255,0.82)">
    Do BR Code ao payload JSON — tudo que você precisa saber sobre como o Pix funciona quando um QR Code é lido
  </text>

  <!-- separador -->
  <line x1="40" y1="148" x2="760" y2="148" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- pills -->
  <rect x="40"  y="160" width="126" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
  <text x="103" y="176" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)" text-anchor="middle">30–60 min de estudo</text>

  <rect x="178" y="160" width="212" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
  <text x="284" y="176" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)" text-anchor="middle">Manuais BCB vigentes (2026)</text>

  <rect x="402" y="160" width="318" height="24" rx="12" fill="rgba(255,255,255,0.12)"/>
  <text x="561" y="176" font-family="system-ui,sans-serif" font-size="11" fill="rgba(255,255,255,0.9)" text-anchor="middle">Res. BCB 1/2020 + Manuais UX v7.3 e Padrões v2.9.0</text>
</svg>
