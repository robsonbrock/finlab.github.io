<svg xmlns="http://www.w3.org/2000/svg" width="800" height="210" viewBox="0 0 800 210">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="800" height="210" rx="10" fill="url(#bg)"/>

  <!-- grade sutil de fundo -->
  <line x1="0"   y1="52"  x2="800" y2="52"  stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0"   y1="104" x2="800" y2="104" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0"   y1="156" x2="800" y2="156" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="200" y1="0"   x2="200" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0"   x2="400" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="600" y1="0"   x2="600" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- acento azul -->
  <rect x="0" y="0" width="4" height="210" rx="2" fill="#4493f8"/>

  <!-- logo CN Ed -->
  <rect x="40" y="34" width="44" height="44" rx="8" fill="#1f2937"/>
  <text x="62" y="54" font-family="system-ui,monospace,sans-serif" font-size="11" font-weight="700"
        fill="#4493f8" text-anchor="middle">CN</text>
  <text x="62" y="68" font-family="system-ui,monospace,sans-serif" font-size="11" font-weight="700"
        fill="#4493f8" text-anchor="middle">Ed</text>

  <!-- badge -->
  <rect x="96" y="34" width="96" height="22" rx="11" fill="rgba(68,147,248,0.15)"/>
  <text x="144" y="49" font-family="system-ui,sans-serif" font-size="11" font-weight="600"
        fill="#4493f8" text-anchor="middle" letter-spacing="1">FERRAMENTA</text>

  <!-- título -->
  <text x="96" y="96" font-family="system-ui,sans-serif" font-size="34" font-weight="800" fill="white">CNAB Editor</text>

  <!-- subtítulo -->
  <text x="96" y="122" font-family="system-ui,sans-serif" font-size="13.5" fill="rgba(255,255,255,0.6)">
    Edite arquivos CNAB 240 e 150 com validação de campos em tempo real
  </text>

  <!-- separador -->
  <line x1="40" y1="148" x2="760" y2="148" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- chips de formato -->
  <rect x="40"  y="160" width="92"  height="24" rx="12" fill="rgba(68,147,248,0.12)"/>
  <text x="86"  y="176" font-family="system-ui,monospace,sans-serif" font-size="11"
        fill="#4493f8" text-anchor="middle">CNAB 240</text>

  <rect x="144" y="160" width="92"  height="24" rx="12" fill="rgba(68,147,248,0.12)"/>
  <text x="190" y="176" font-family="system-ui,monospace,sans-serif" font-size="11"
        fill="#4493f8" text-anchor="middle">CNAB 150</text>

  <rect x="248" y="160" width="130" height="24" rx="12" fill="rgba(255,255,255,0.06)"/>
  <text x="313" y="176" font-family="system-ui,sans-serif" font-size="11"
        fill="rgba(255,255,255,0.5)" text-anchor="middle">Validação em tempo real</text>
</svg>
